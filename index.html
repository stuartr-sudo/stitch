<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stitch - Video Advert Creator</title>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#2C666E;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>
          <div style="color:#64748b;font-size:14px;letter-spacing:0.1em">Loading</div>
        </div>
      </div>
      <style>#initial-loader{opacity:1;transition:opacity .3s}@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
